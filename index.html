<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر محاكاة الأمن السيبراني</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="card-sim">
            <h2 id="main-title">استخراج البطاقات عبر رمز OTP</h2>
            <p id="sub-description">أدخل رمز الـ OTP لعرض البطاقات المتاحة:</p>
            
            <div class="input-group">
                <input type="text" id="cardInput" placeholder="0 0 0 0 0 0" maxlength="6">
            </div>

            <button onclick="checkCard()" id="action-btn">عرض البطاقات المتاحة 🔒</button>
            
            <div id="result"></div>
        </div>
        <p class="footer-note">تحذير: هذا الموقع مخصص للأغراض التعليمية.</p>
    </div>

    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeProfileModal()">&times;</span>
            
            <div id="password-form-section">
                <h3 style="color: #1a73e8;">تأكيد كلمة المرور</h3>
                <p style="font-size: 13px; color: #555;">يرجى إدخال كلمة مرور الحساب الشخصي:</p>
                <input type="password" id="profilePassword" placeholder="كلمة المرور" style="width: 85%; padding: 12px; margin-top: 15px; text-align: center; border: 1px solid #ddd; border-radius: 8px;">
                <button onclick="verifyProfilePassword()" style="margin-top: 20px; width: 100%; background-color: #34a853;">تأكيد الدخول</button>
                <p id="profile-pass-error" style="color: red; font-size: 12px; margin-top: 10px; display: none;"></p>
            </div>

            <div id="profile-data-section" style="display: none; text-align: right;">
                <h3 style="color: #c62828;">✅ بيانات الملف الشخصي</h3>
                <div style="padding: 15px; background: #f9f9f9; border-radius: 8px; line-height: 1.8; color: #333; font-size: 14px;">
                    <strong>الاسم كاملاً:</strong> أحمد عثمان شادي أبو شعر<br>
                    <strong>تاريخ التسجيل:</strong> 12/11/2018<br>
                    <strong>عدد البطاقات المستخدمة:</strong> <span style="font-weight: bold; color: #1a73e8;">11012</span> بطاقة.
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

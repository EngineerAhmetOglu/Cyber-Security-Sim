<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<body>

<section id="card-sim">

    <div class="input-container">
        <input type="text" id="cardInput" placeholder="- - - - - -" maxlength="6">
    </div>

    <button onclick="checkCard()">عرض البطاقات المتاحة</button>
    
    <div id="result"></div>
</section>
    </div>

    <div id="dynamic-cards" style="max-height: 300px; overflow-y: auto; border: 1px solid #ddd; background: #fff;">
        </div>

</div>

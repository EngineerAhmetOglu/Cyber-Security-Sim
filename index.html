<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة البطاقات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="card-sim">
            <h2 style="color: #1a73e8;">استخراج البطاقات عبر رمز OTP</h2>
            <div class="input-group">
                <input type="text" id="cardInput" placeholder="0 0 0 0 0 0" maxlength="6">
            </div>
            <button onclick="checkCard()">عرض البطاقات المتاحة 🔒</button>
            <div id="result"></div>
        </div>
    </div>

    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('passwordModal')">&times;</span>
            <div id="password-form-section">
                <h3>تأكيد كلمة المرور</h3>
                <input type="password" id="profilePassword" placeholder="كلمة المرور" style="width:90%; padding:10px; margin:10px 0; text-align:center;">
                <button onclick="verifyProfilePassword()" style="background-color: #34a853;">تأكيد الدخول</button>
                <p id="profile-pass-error" style="color:red; display:none;"></p>
            </div>
            <div id="profile-data-section" style="display:none; text-align:right;">
                <h3 style="color:#c62828;">✅ بيانات الملف الشخصي</h3>
                <p><strong>الاسم:</strong> أحمد عثمان شادي أبو شعر</p>
                <p><strong>التسجيل:</strong> 12/11/2018</p>
                <p><strong>البطاقات:</strong> 11012 بطاقة</p>
            </div>
        </div>
    </div>

    <div id="cardActionsModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('cardActionsModal')">&times;</span>
            <h3 id="selectedCardName" style="color:#1a73e8;"></h3>
            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
                <button onclick="alert('جاري تحميل البيانات...') " style="background-color: #34a853;">تحميل بيانات البطاقة 📥</button>
                <button onclick="alert('جاري الانتقال للدفع...') " style="background-color: #1a73e8;">الانتقال إلى الدفع المباشر 💳</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
